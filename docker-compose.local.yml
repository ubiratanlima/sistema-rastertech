version: '3.8'

services:
  # 🌍 TRAEFIK (O GERENTE DE ROTAS LOCAL)
  traefik:
    image: traefik:v2.10
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"       # Site principal e Studio
      - "8081:8080"   # Painel do Traefik (Dashboard)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - EmbraNet

  # 🏦 POSTGRES RASTERTECH
  rastertech-db:
    image: postgres:15
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - rastertech-db-data:/var/lib/postgresql/data
      - ./docker/volumes/db/zz-setup-embraet.sql:/docker-entrypoint-initdb.d/zz-setup-embraet.sql
    networks:
      - EmbraNet

  # 🧠 REDIS
  rastertech-redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - EmbraNet

  # 📡 KONG API GATEWAY (Idêntico à Produção)
  rastertech-kong:
    image: kong:2.8.1
    restart: unless-stopped
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/etc/kong/kong.yml
      - KONG_PROXY_LISTEN=0.0.0.0:8000
    volumes:
      - ./docker/volumes/db/kong.yml:/etc/kong/kong.yml
    networks:
      - EmbraNet
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.rastertech.rule=Host(`rastertech.local`)"
        - "traefik.http.routers.rastertech.entrypoints=web"
        - "traefik.http.services.rastertech.loadbalancer.server.port=8000"

  # 🛡️ NGINX WEB SIDECAR
  rastertech-web:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./:/var/www
      - ./docker/volumes/web/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - EmbraNet

  # 🏎️ LARAVEL APP
  rastertech-app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./:/var/www
    environment:
      - APP_NAME=${APP_NAME}
      - APP_ENV=local
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=true
      - APP_URL=http://rastertech.local
      - DB_CONNECTION=pgsql
      - DB_HOST=rastertech-db
      - DB_PORT=5432
      - DB_DATABASE=postgres
      - DB_USERNAME=postgres
      - DB_PASSWORD=${DB_PASSWORD}
    networks:
      - EmbraNet

  # 📊 SUPABASE STUDIO
  supabase-studio:
    image: supabase/studio:2025.11.10-sha-5291fe3
    environment:
      - HOSTNAME=0.0.0.0
      - SUPABASE_URL=http://rastertech-kong:8000
      - SUPABASE_PUBLIC_URL=http://studio.local
      - SUPABASE_ANON_KEY=${ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SERVICE_ROLE_KEY}
      - AUTH_JWT_SECRET=${JWT_SECRET}
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_HOST=rastertech-db
      - POSTGRES_PORT=5432
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - STUDIO_PG_META_URL=http://supabase-meta:8080
    networks:
      - EmbraNet
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.supabase-studio.rule=Host(`studio.local`)"
        - "traefik.http.routers.supabase-studio.entrypoints=web"
        - "traefik.http.services.supabase-studio.loadbalancer.server.port=3000"

  # 🧠 SUPABASE META
  supabase-meta:
    image: supabase/postgres-meta:v0.84.2
    environment:
      - PG_META_PORT=8080
      - PG_META_DB_URL=postgres://postgres:${DB_PASSWORD}@rastertech-db:5432/postgres?sslmode=disable
    networks:
      - EmbraNet

networks:
  EmbraNet:
    driver: bridge

volumes:
  rastertech-db-data:
