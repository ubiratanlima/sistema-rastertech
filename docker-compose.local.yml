version: '3.8'

services:
  # 🌍 TRAEFIK LOCAL (Habilitado para paridade, mas porta 8081 para não conflitar)
  traefik:
    image: traefik:v2.10
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:8080"
    ports:
      - "8081:8080" # Painel do Traefik
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - EmbraNet

  # 🏦 POSTGRES RASTERTECH
  rastertech-db:
    image: postgres:15
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - rastertech-db-local-data:/var/lib/postgresql/data
    networks:
      - EmbraNet

  # 🧠 REDIS
  rastertech-redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - EmbraNet

  # 📡 KONG API GATEWAY (Direto na porta 80 para evitar 404)
  rastertech-kong:
    image: kong:2.8.1
    restart: unless-stopped
    ports:
      - "80:8000" # ACESSO DIRETO VIA http://localhost
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/tmp/kong.yml
    entrypoint: 
      - /bin/sh
      - -c
      - |
        echo '_format_version: "1.1"
        services:
          - name: rastertech-api
            url: http://rastertech-web:80
            routes:
              - name: main-dashboard
                paths: ["/", "/devices", "/sim-cards", "/customers", "/fleets"]
                strip_path: false
          - name: rastertech-rest
            url: http://supabase-rest:3000
            routes:
              - name: rest-api
                paths: ["/rest"]
                strip_path: true' > /tmp/kong.yml && \
        /docker-entrypoint.sh kong docker-start
    networks:
      - EmbraNet

  # 🛡️ NGINX WEB SIDECAR
  rastertech-web:
    image: nginx:alpine
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo 'server { 
          listen 80; 
          index index.php; 
          root /var/www/public; 
          location ~ \.php$$ { 
            fastcgi_pass rastertech-app:9000; 
            include fastcgi_params; 
            fastcgi_param SCRIPT_FILENAME /var/www/public/index.php; 
          } 
          location / { 
            try_files $$uri $$uri/ /index.php?$$query_string; 
          } 
        }' > /etc/nginx/conf.d/default.conf && \
        nginx -g "daemon off;"
    # volumes:
    #   - ./:/var/www
    networks:
      - EmbraNet

  # 🏎️ LARAVEL APP (Usando imagem local existente)
  rastertech-app:
    image: sistema-rastertech-app:latest
    restart: unless-stopped
    # volumes:
    #   - ./:/var/www
    environment:
      - APP_NAME=${APP_NAME}
      - APP_ENV=local
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=true
      - DB_HOST=rastertech-db
      - DB_PASSWORD=${DB_PASSWORD}
    networks:
      - EmbraNet

  # 📊 SUPABASE STUDIO
  supabase-studio:
    image: supabase/studio:2025.11.10-sha-5291fe3
    ports:
      - "54323:3000" # Acesso direto ao Studio via porta 54323
    environment:
      - HOSTNAME=0.0.0.0
      - SUPABASE_URL=http://rastertech-kong:8000
      - SUPABASE_PUBLIC_URL=http://localhost:54323
      - SUPABASE_ANON_KEY=${ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SERVICE_ROLE_KEY}
      - AUTH_JWT_SECRET=${JWT_SECRET}
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_HOST=rastertech-db
      - POSTGRES_PORT=5432
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - STUDIO_PG_META_URL=http://supabase-meta:8080
    networks:
      - EmbraNet

  # 🧠 SUPABASE META
  supabase-meta:
    image: supabase/postgres-meta:v0.84.2
    environment:
      - PG_META_PORT=8080
      - PG_META_DB_URL=postgres://postgres:${DB_PASSWORD}@rastertech-db:5432/postgres?sslmode=disable
    networks:
      - EmbraNet

networks:
  EmbraNet:
    driver: bridge

volumes:
  rastertech-db-local-data:
