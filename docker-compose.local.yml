version: '3.8'

services:
  # 🌍 TRAEFIK LOCAL
  traefik:
    image: traefik:v2.10
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - EmbraNet

  # 🏦 POSTGRES RASTERTECH
  rastertech-db:
    image: postgres:15
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - rastertech-db-local-data:/var/lib/postgresql/data
    networks:
      - EmbraNet

  # 📡 KONG API GATEWAY (Injeção Direta)
  rastertech-kong:
    image: kong:2.8.1
    restart: unless-stopped
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/tmp/kong.yml
    entrypoint: 
      - /bin/sh
      - -c
      - |
        echo '_format_version: "1.1"
        services:
          - name: rastertech-api
            url: http://rastertech-web:80
            routes:
              - name: main-dashboard
                paths: ["/", "/devices", "/sim-cards", "/customers", "/fleets"]
                strip_path: false' > /tmp/kong.yml && \
        /docker-entrypoint.sh kong docker-start
    networks:
      - EmbraNet
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.rastertech.rule=Host(`localhost`) || Host(`127.0.0.1`)"
        - "traefik.http.routers.rastertech.entrypoints=web"
        - "traefik.http.services.rastertech.loadbalancer.server.port=8000"

  # 🛡️ NGINX WEB SIDECAR (Compartilhando Volume com App)
  rastertech-web:
    image: nginx:alpine
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo 'server { 
          listen 80; 
          index index.php; 
          root /var/www/public; 
          location ~ \.php$$ { 
            fastcgi_pass rastertech-app:9000; 
            include fastcgi_params; 
            fastcgi_param SCRIPT_FILENAME $$document_root$$fastcgi_script_name; 
          } 
          location / { 
            try_files $$uri $$uri/ /index.php?$$query_string; 
          } 
        }' > /etc/nginx/conf.d/default.conf && \
        nginx -g "daemon off;"
    volumes:
      - rastertech-local-public:/var/www/public:ro
    networks:
      - EmbraNet

  # 🏎️ LARAVEL APP (Dono do Volume)
  rastertech-app:
    image: sistema-rastertech-app:latest
    restart: unless-stopped
    volumes:
      - rastertech-local-public:/var/www/public
    environment:
      - APP_NAME=${APP_NAME}
      - APP_ENV=local
      - APP_KEY=${APP_KEY}
      - DB_HOST=rastertech-db
      - DB_PASSWORD=${DB_PASSWORD}
    networks:
      - EmbraNet

networks:
  EmbraNet:
    driver: bridge

volumes:
  rastertech-db-local-data:
  rastertech-local-public: # O volume mágico que resolve o "File not found"
