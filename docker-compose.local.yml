version: '3.8'

services:
  # 🌍 TRAEFIK LOCAL
  traefik:
    image: traefik:v2.10
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - EmbraNet

  # 🏦 POSTGRES RASTERTECH
  rastertech-db:
    image: postgres:15
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - rastertech-db-local-data:/var/lib/postgresql/data
    networks:
      - EmbraNet

  # 🧠 REDIS
  rastertech-redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - EmbraNet

  # 📡 KONG API GATEWAY
  rastertech-kong:
    image: kong:2.8.1
    restart: unless-stopped
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/tmp/kong.yml
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo '_format_version: "1.1"
        services:
          - name: rastertech-api
            url: http://rastertech-web:80
            routes:
              - name: main-dashboard
                paths: ["/"]
                strip_path: false' > /tmp/kong.yml && \
        /docker-entrypoint.sh kong docker-start
    # LABELS NO NÍVEL DO SERVIÇO (não dentro de deploy) para funcionar em modo Compose
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rastertech.rule=PathPrefix(`/`)"
      - "traefik.http.routers.rastertech.entrypoints=web"
      - "traefik.http.services.rastertech.loadbalancer.server.port=8000"
    networks:
      - EmbraNet

  # 🛡️ NGINX WEB SIDECAR
  # ESTRATÉGIA: Nginx passa TUDO para o PHP-FPM.
  # Não precisa de volumes com arquivos estáticos.
  # O PHP-FPM (rastertech-app) tem os arquivos dentro da própria imagem.
  rastertech-web:
    image: nginx:alpine
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo 'server {
          listen 80;
          location / {
            fastcgi_pass rastertech-app:9000;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
            fastcgi_param REQUEST_URI $$request_uri;
            fastcgi_param QUERY_STRING $$query_string;
          }
        }' > /etc/nginx/conf.d/default.conf && nginx -g "daemon off;"
    networks:
      - EmbraNet

  # 🏎️ LARAVEL APP (PHP-FPM com arquivos internos da imagem)
  # SEM volumes de código - usa arquivos da imagem diretamente
  rastertech-app:
    image: sistema-rastertech-app:latest
    restart: unless-stopped
    environment:
      - APP_NAME=${APP_NAME}
      - APP_ENV=local
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=rastertech-db
      - DB_PORT=5432
      - DB_DATABASE=postgres
      - DB_USERNAME=postgres
      - DB_PASSWORD=${DB_PASSWORD}
    networks:
      - EmbraNet

networks:
  EmbraNet:
    driver: bridge

volumes:
  rastertech-db-local-data:
