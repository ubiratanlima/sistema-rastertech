version: '3.8'

services:
  # ----------------------------------------------------------------------------
  # APP INFRAONLY (Plan B)
  # ----------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sistema-rastertech-app-planb
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    environment:
      - APP_ENV=${APP_ENV:-local}
    networks:
      - rastertech-external

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80" # Diferente do oficial para não conflitar
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - rastertech-external

  redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - rastertech-external

networks:
  rastertech-external:
    driver: bridge
