_format_version: "1.1"

services:
  # 🌐 ROTA DO DASHBOARD (AGORA VIA NGINX SIDECAR)
  - name: rastertech-api
    url: http://rastertech-web:80
    routes:
      - name: main-dashboard
        paths:
          - /
          - /devices
          - /sim-cards
          - /customers
          - /fleets
        strip_path: false

  # 🚀 ROTA DO POSTGREST (API REST)
  - name: rastertech-rest
    url: http://supabase-rest:3000
    routes:
      - name: rest-api
        paths:
          - /rest
        strip_path: true
