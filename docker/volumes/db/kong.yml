_format_version: "1.1"
_transform: true

services:
  # 🚀 PORTAL PARA SUPABASE AUTH
  - name: supabase-auth
    url: http://supabase-auth:9999
    routes:
      - name: auth-route
        paths:
          - /auth/v1

  # 🏎️ PORTAL PARA SUPABASE REST
  - name: supabase-rest
    url: http://supabase-rest:3000
    routes:
      - name: rest-route
        paths:
          - /rest/v1

  # 📡 PORTAL PARA LARAVEL (API)
  - name: rastertech-api
    url: http://rastertech-app:80
    routes:
      - name: api-route
        paths:
          - /api
