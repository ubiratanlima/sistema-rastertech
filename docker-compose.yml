version: '3.8'

services:
  # 🏦 POSTGRES RASTERTECH
  rastertech-db:
    image: postgres:15
    restart: unless-stopped
    command: ["postgres", "-c", "listen_addresses=*"]
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - rastertech-db-data:/var/lib/postgresql/data
    configs:
      - source: db_setup
        target: /docker-entrypoint-initdb.d/zz-setup-embraet.sql
    networks:
      - EmbraNet

  # 🧠 REDIS
  rastertech-redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - EmbraNet

  # 📡 KONG API GATEWAY (Porta de Entrada)
  rastertech-kong:
    image: kong:2.8.1
    restart: unless-stopped
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/etc/kong/kong.yml
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_LISTEN=0.0.0.0:8001
      - KONG_NGINX_PROXY_CLIENT_MAX_BODY_SIZE=50m
      - DASHBOARD_USERNAME=${KONG_USER}
      - DASHBOARD_PASSWORD=${KONG_PASS}
      - KONG_TRUSTED_IPS=0.0.0.0/0,::/0
      - KONG_REAL_IP_HEADER=X-Forwarded-For
      - KONG_REAL_IP_RECURSIVE=on
    configs:
      - source: kong_config
        target: /etc/kong/kong.yml
    networks:
      - EmbraNet
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=EmbraNet"
        - "traefik.http.routers.rastertech.rule=Host(`rastertech.embraet.com.br`)"
        - "traefik.http.routers.rastertech.entrypoints=websecure"
        - "traefik.http.routers.rastertech.tls=true"
        - "traefik.http.routers.rastertech.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.rastertech.loadbalancer.passHostHeader=true"
        - "traefik.http.services.rastertech.loadbalancer.server.port=8000"

  # 🛡️ THE WEB SIDECAR (NGINX)
  rastertech-web:
    image: nginx:alpine
    restart: unless-stopped
    configs:
      - source: nginx_config_v2
        target: /etc/nginx/conf.d/default.conf
    volumes:
      - rastertech-public:/var/www/public:ro
    networks:
      - EmbraNet

  # 🏎️ LARAVEL APP
  rastertech-app:
    image: sistema-rastertech-app:latest
    restart: unless-stopped
    volumes:
      - rastertech-public:/var/www/public
    environment:
      - APP_NAME=${APP_NAME}
      - APP_ENV=production
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=false
      - APP_URL=${APP_URL}
      - DB_CONNECTION=${DB_CONNECTION}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - TRUSTED_PROXIES=*
    networks:
      - EmbraNet

  # 👤 SUPABASE AUTH
  supabase-auth:
    image: supabase/gotrue:v2.132.3
    restart: unless-stopped
    environment:
      - GOTRUE_DB_DRIVER=postgres
      - GOTRUE_DB_DATABASE_URL=postgres://supabase_auth_admin:RastertechMasterInternal_123@rastertech-db:5432/postgres
      - GOTRUE_SITE_URL=http://localhost
      - GOTRUE_API_EXTERNAL_URL=${APP_URL_SUPABASE}
      - API_EXTERNAL_URL=${APP_URL_SUPABASE}
      - GOTRUE_JWT_SECRET=${JWT_SECRET}
      - GOTRUE_JWT_EXP=3600
      - GOTRUE_EXTERNAL_EMAIL_ENABLED=false
      - GOTRUE_DB_MAX_POOL_SIZE=20
    networks:
      - EmbraNet

  # 🚀 REST INTERFACE
  supabase-rest:
    image: postgrest/postgrest:v10.1.1
    environment:
      - PGRST_DB_URI=postgres://authenticator:RastertechMasterInternal_123@rastertech-db:5432/postgres
      - PGRST_DB_SCHEMA=public
      - PGRST_DB_ANON_ROLE=anon
      - PGRST_JWT_SECRET=${JWT_SECRET}
    networks:
      - EmbraNet

  # ----------------------------------------------------------------------------
  # 📊 INTERFACE VISUAL (DESATIVADA POR SEGURANÇA)
