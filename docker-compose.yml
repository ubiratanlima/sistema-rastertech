version: '3.8'

services:
  # 🏦 POSTGRES RASTERTECH
  rastertech-db:
    image: postgres:15
    restart: unless-stopped
    command: ["postgres", "-c", "listen_addresses=*"]
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./docker/volumes/db/zz-setup-embraet.sql:/docker-entrypoint-initdb.d/zz-setup-embraet.sql
      - ./docker/volumes/db/data_v3:/var/lib/postgresql/data
    networks:
      - EmbraNetV2

  # 🧠 REDIS
  rastertech-redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - EmbraNetV2

  # 📡 KONG API GATEWAY
  rastertech-kong:
    image: kong:2.8.1
    restart: unless-stopped
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/etc/kong/kong.yml
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_LISTEN=0.0.0.0:8001
      - KONG_NGINX_PROXY_CLIENT_MAX_BODY_SIZE=50m
      - DASHBOARD_USERNAME=${KONG_USER}
      - DASHBOARD_PASSWORD=${KONG_PASS}
    volumes:
      - ./docker/volumes/db/kong.yml:/etc/kong/kong.yml:ro
    networks:
      - EmbraNetV2
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=EmbraNetV2"
        - "traefik.http.routers.rastertech.rule=Host(`rastertech.embraet.com.br`)"
        - "traefik.http.routers.rastertech.entrypoints=websecure"
        - "traefik.http.routers.rastertech.tls=true"
        - "traefik.http.routers.rastertech.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.rastertech.loadbalancer.passHostHeader=true"
        - "traefik.http.services.rastertech.loadbalancer.server.port=8000"

  # 👤 SUPABASE AUTH
  supabase-auth:
    image: supabase/gotrue:v2.132.3
    restart: unless-stopped
    depends_on:
      - rastertech-db
    environment:
      - GOTRUE_DB_DRIVER=postgres
      - GOTRUE_DB_DATABASE_URL=postgres://supabase_auth_admin:RastertechMasterInternal_123@rastertech-db:5432/postgres
      - GOTRUE_SITE_URL=http://localhost
      - GOTRUE_API_EXTERNAL_URL=${APP_URL_SUPABASE}
      - API_EXTERNAL_URL=${APP_URL_SUPABASE}
      - GOTRUE_JWT_SECRET=${JWT_SECRET}
      - GOTRUE_JWT_EXP=3600
      - GOTRUE_EXTERNAL_EMAIL_ENABLED=false
      - GOTRUE_DB_MAX_POOL_SIZE=20
    networks:
      - EmbraNetV2

  # 🚀 REST INTERFACE
  supabase-rest:
    image: postgrest/postgrest:v10.1.1
    depends_on:
      - rastertech-db
    environment:
      - PGRST_DB_URI=postgres://authenticator:RastertechMasterInternal_123@rastertech-db:5432/postgres
      - PGRST_DB_SCHEMA=public
      - PGRST_DB_ANON_ROLE=anon
      - PGRST_JWT_SECRET=${JWT_SECRET}
    networks:
      - EmbraNetV2

  # 🏎️ LARAVEL APP (PHP-FPM ENGINE)
  rastertech-app:
    image: sistema-rastertech-app:latest
    restart: unless-stopped
    volumes:
      - .:/var/www
      - ./docker/php/99-rastertech.ini:/usr/local/etc/php/conf.d/99-rastertech.ini:ro
    environment:
      - APP_KEY=${APP_KEY}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - rastertech-db
      - rastertech-redis
    networks:
      - EmbraNetV2

  # 🛡️ THE WEB SIDECAR (NGINX ELITE)
  rastertech-web:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - .:/var/www
      - ./docker/volumes/web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - rastertech-app
    networks:
      - EmbraNetV2

networks:
  EmbraNetV2:
    driver: overlay
    attachable: true
