version: "3.7"

services:
  # ----------------------------------------------------------------------------
  # CORE: Laravel App (PHP 8.2-FPM)
  # ----------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sistema-rastertech-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    environment:
      - APP_ENV=${APP_ENV:-local}
      - DB_CONNECTION=pgsql
      - DB_HOST=supabase_db
      - DB_PORT=5432
      - REDIS_HOST=redis
    networks:
      - EmbraNet

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - EmbraNet

  redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - EmbraNet

