version: '3.8'

services:
  # 🏦 POSTGRES RASTERTECH
  rastertech-db:
    image: postgres:15
    restart: unless-stopped
    command: ["postgres", "-c", "listen_addresses=*"]
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - rastertech-db-data:/var/lib/postgresql/data
    configs:
      - source: db_setup
        target: /docker-entrypoint-initdb.d/zz-setup-embraet.sql
    networks:
      - EmbraNetV2

  # 🧠 REDIS
  rastertech-redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - EmbraNetV2

  # 📡 KONG API GATEWAY
  rastertech-kong:
    image: sistema-rastertech-kong:latest
    restart: unless-stopped
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/etc/kong/kong.yml
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_LISTEN=0.0.0.0:8001
      - KONG_NGINX_PROXY_CLIENT_MAX_BODY_SIZE=50m
      - DASHBOARD_USERNAME=${KONG_USER}
      - DASHBOARD_PASSWORD=${KONG_PASS}
    configs:
      - source: kong_config
        target: /etc/kong/kong.yml
    networks:
      - EmbraNetV2
      - traefik_public # <--- Verifique se este é o nome da rede
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.rastertech.rule=Host(`rastertech.embraet.com.br`)"
        - "traefik.http.routers.rastertech.entrypoints=websecure"
        - "traefik.http.routers.rastertech.tls=true"
        - "traefik.http.routers.rastertech.tls.certresolver=letsencrypt" # <--- Ou o nome do seu resolver
        - "traefik.http.services.rastertech.loadbalancer.server.port=8000"

  # 🛡️ THE WEB SIDECAR (NGINX)
  rastertech-web:
    image: nginx:alpine
    restart: unless-stopped
    configs:
      - source: nginx_config
        target: /etc/nginx/conf.d/default.conf
    # Nota: Em Swarm, para o Nginx ver os arquivos do App sem build,
    # o ideal é que os arquivos estejam no host. 
    # Vou manter o volume rastertech-public para sincronismo.
    volumes:
      - rastertech-public:/var/www/public:ro
    depends_on:
      - rastertech-app
    networks:
      - EmbraNetV2

  # 🏎️ LARAVEL APP
  rastertech-app:
    image: sistema-rastertech-app:latest
    restart: unless-stopped
    volumes:
      - rastertech-public:/var/www/public
    environment:
      - APP_NAME=${APP_NAME}
      - APP_ENV=${APP_ENV}
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=${APP_DEBUG}
      - APP_URL=${APP_URL}
      - DB_CONNECTION=${DB_CONNECTION}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - EmbraNetV2

  # 👤 SUPABASE AUTH
  supabase-auth:
    image: supabase/gotrue:v2.132.3
    restart: unless-stopped
    environment:
      - GOTRUE_DB_DRIVER=postgres
      - GOTRUE_DB_DATABASE_URL=postgres://supabase_auth_admin:RastertechMasterInternal_123@rastertech-db:5432/postgres
      - GOTRUE_SITE_URL=http://localhost
      - GOTRUE_API_EXTERNAL_URL=${APP_URL_SUPABASE}
      - API_EXTERNAL_URL=${APP_URL_SUPABASE}
      - GOTRUE_JWT_SECRET=${JWT_SECRET}
      - GOTRUE_JWT_EXP=3600
      - GOTRUE_EXTERNAL_EMAIL_ENABLED=false
      - GOTRUE_DB_MAX_POOL_SIZE=20
    networks:
      - EmbraNetV2

  # 🚀 REST INTERFACE
  supabase-rest:
    image: postgrest/postgrest:v10.1.1
    environment:
      - PGRST_DB_URI=postgres://authenticator:RastertechMasterInternal_123@rastertech-db:5432/postgres
      - PGRST_DB_SCHEMA=public
      - PGRST_DB_ANON_ROLE=anon
      - PGRST_JWT_SECRET=${JWT_SECRET}
    networks:
      - EmbraNetV2

networks:
  EmbraNetV2:
    driver: overlay
    attachable: true
  traefik_public:
    external: true

volumes:
  rastertech-public: 
  rastertech-db-data: 

configs:
  db_setup:
    file: ./docker/volumes/db/zz-setup-embraet.sql
  kong_config:
    file: ./docker/volumes/db/kong.yml
  nginx_config:
    file: ./docker/volumes/web/nginx.conf
