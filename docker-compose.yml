version: '3.8'

services:
  # 🏦 POSTGRES RASTERTECH (Imune a erros de volume)
  rastertech-db:
    build:
      context: .
      dockerfile: Dockerfile.db
    image: sistema-rastertech-db:latest
    restart: unless-stopped
    command: ["postgres", "-c", "listen_addresses=*"]
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - rastertech-db-data:/var/lib/postgresql/data
    networks:
      - EmbraNetV2

  # 🧠 REDIS
  rastertech-redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - EmbraNetV2

  # 📡 KONG API GATEWAY (Imune a erros de volume)
  rastertech-kong:
    build:
      context: .
      dockerfile: Dockerfile.kong
    image: sistema-rastertech-kong:latest
    restart: unless-stopped
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/etc/kong/kong.yml
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_LISTEN=0.0.0.0:8001
      - KONG_NGINX_PROXY_CLIENT_MAX_BODY_SIZE=50m
      - DASHBOARD_USERNAME=${KONG_USER}
      - DASHBOARD_PASSWORD=${KONG_PASS}
    ports:
      - "8000:8000"
      - "8001:8001"
    networks:
      - EmbraNetV2

  # 👤 SUPABASE AUTH
  supabase-auth:
    image: supabase/gotrue:v2.132.3
    restart: unless-stopped
    depends_on:
      - rastertech-db
    environment:
      - GOTRUE_DB_DRIVER=postgres
      - GOTRUE_DB_DATABASE_URL=postgres://supabase_auth_admin:RastertechMasterInternal_123@rastertech-db:5432/postgres
      - GOTRUE_SITE_URL=http://localhost
      - GOTRUE_API_EXTERNAL_URL=${APP_URL_SUPABASE}
      - API_EXTERNAL_URL=${APP_URL_SUPABASE}
      - GOTRUE_JWT_SECRET=${JWT_SECRET}
      - GOTRUE_JWT_EXP=3600
      - GOTRUE_EXTERNAL_EMAIL_ENABLED=false
      - GOTRUE_DB_MAX_POOL_SIZE=20
    networks:
      - EmbraNetV2

  # 🚀 REST INTERFACE
  supabase-rest:
    image: postgrest/postgrest:v10.1.1
    depends_on:
      - rastertech-db
    environment:
      - PGRST_DB_URI=postgres://authenticator:RastertechMasterInternal_123@rastertech-db:5432/postgres
      - PGRST_DB_SCHEMA=public
      - PGRST_DB_ANON_ROLE=anon
      - PGRST_JWT_SECRET=${JWT_SECRET}
    networks:
      - EmbraNetV2

  # 🏎️ LARAVEL APP (Totalmente Embutido)
  rastertech-app:
    build:
      context: .
      dockerfile: ./Dockerfile
    image: sistema-rastertech-app:latest
    restart: unless-stopped
    volumes:
      - rastertech-public:/var/www/public
    environment:
      - APP_KEY=${APP_KEY}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - rastertech-db
      - rastertech-redis
    networks:
      - EmbraNetV2

  # 🛡️ THE WEB SIDECAR (Nginx com config embutida)
  rastertech-web:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    image: sistema-rastertech-web:latest
    restart: unless-stopped
    volumes:
      - rastertech-public:/var/www/public:ro
    depends_on:
      - rastertech-app
    networks:
      - EmbraNetV2

networks:
  EmbraNetV2:
    driver: overlay
    attachable: true

volumes:
  rastertech-public: 
  rastertech-db-data: 
