networks:
  EmbraNet:
    external: true

volumes:
  rastertech-public: 
  rastertech-db-data: 

configs:
  db_setup:
    file: ./docker/volumes/db/zz-setup-embraet.sql
  kong_config:
    file: ./docker/volumes/db/kong.yml
  nginx_config_v2:
    file: ./docker/volumes/web/nginx.conf
